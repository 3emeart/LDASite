<div class="gestao-page">
  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="gestao-wrapper">
    <div class="header">
      <div class="brand">
        <svg viewBox="0 0 40 40" fill="none" class="brand-icon">
          <circle cx="20" cy="20" r="19" stroke="url(#grad)" stroke-width="2"/>
          <path d="M12 28 L20 12 L28 28 L20 22 Z" fill="url(#grad)"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4f9dff"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <h1 class="page-title">Gestão de Campeonato</h1>
          <p class="page-subtitle">Administração dos times e tabela do campeonato</p>
        </div>
      </div>
    </div>

    <!-- Container for Form & Table -->
    <div class="content-grid">
      
      <!-- Panel: Manage Team (Form) -->
      <div class="glass-panel form-panel">
        <h2 class="panel-title">{{ editando ? 'Editar Time' : 'Novo Time' }}</h2>
        <div class="form-container">
          <div class="field-group">
            <label for="nome-time">Nome do Time</label>
            <div class="input-wrapper">
              <input id="nome-time" type="text" [(ngModel)]="novoTime.nome" placeholder="Ex: Galáticos FC" />
            </div>
          </div>

          <div class="field-group">
            <label for="pontos-time">Pontos</label>
            <div class="input-wrapper">
              <input id="pontos-time" type="number" [(ngModel)]="novoTime.pontos" placeholder="0" />
            </div>
          </div>

          <div class="action-buttons">
            <button class="btn-primary" (click)="salvar()">
              {{ editando ? 'Atualizar Time' : 'Salvar Time' }}
            </button>
            <button class="btn-secondary" *ngIf="editando" (click)="cancelarEdicao()">Cancelar</button>
          </div>
        </div>
      </div>

      <!-- Panel: Table -->
      <div class="glass-panel table-panel">
        <h2 class="panel-title">Tabela de Classificação</h2>
        
        <div class="table-container">
          <table class="premium-table">
            <thead>
              <tr>
                <th class="pos-col">#</th>
                <th class="name-col">Time</th>
                <th class="pts-col">PTS</th>
                <th class="actions-col">Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let time of times; let i = index" [class.highlight]="time.id === novoTime.id">
                <td class="pos-col"><span class="rank">{{ i + 1 }}</span></td>
                <td class="name-col">{{ time.nome }}</td>
                <td class="pts-col"><span class="points-badge">{{ time.pontos }}</span></td>
                <td class="actions-col">
                  <button class="icon-btn edit-btn" title="Editar" (click)="prepararEdicao(time)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                  </button>
                  <button class="icon-btn delete-btn" title="Excluir" (click)="excluir(time.id)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"></polyline>
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                  </button>
                </td>
              </tr>
              <tr *ngIf="times.length === 0">
                <td colspan="4" class="empty-state">
                  <div class="empty-content">Nenhum time cadastrado no momento.</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>
</div>
