<div class="login-page">

  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- Login card -->
  <div class="login-wrapper">

    <!-- Logo / Brand -->
    <div class="login-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="19" stroke="url(#grad)" stroke-width="2" />
          <path d="M12 28 L20 12 L28 28 L20 22 Z" fill="url(#grad)" />
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4f9dff" />
              <stop offset="100%" stop-color="#a855f7" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">LDA</span>
        <span class="brand-subtitle">Liga Desportiva de Aracinã</span>
      </div>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="card-header">
        <h1>Bem-vindo(a)</h1>
        <p>Área restrita para administradores</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">

        <div class="field-group">
          <label for="email-input">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z" />
                <path d="M22 6l-10 7L2 6" />
              </svg>
            </span>
            <input id="email-input" type="email" name="email" [(ngModel)]="loginData.email" placeholder="seu@email.com"
              required autocomplete="email" />
          </div>
        </div>

        <div class="field-group">
          <label for="password-input">Senha</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input id="password-input" type="password" name="password" [(ngModel)]="loginData.password"
              placeholder="••••••••" required autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
          <span class="btn-text">Entrar</span>
          <span class="btn-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </span>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="login-footer">LDA &copy; 2025 — Todos os direitos reservados</p>
  </div>
</div>
